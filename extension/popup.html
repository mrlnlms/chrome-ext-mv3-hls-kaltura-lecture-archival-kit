<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kaltura Lecture Archival Kit</title>
  <style>
    body { font-family: system-ui, sans-serif; font-size: 13px; width: 360px; padding: 12px; margin: 0; }
    h1 { font-size: 14px; margin: 0 0 8px 0; }
    h2 { font-size: 12px; margin: 10px 0 4px 0; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
    .row { margin: 6px 0; display: flex; justify-content: space-between; }
    .label { color: #666; }
    .value { font-family: "SF Mono", Menlo, monospace; }
    button { width: 100%; padding: 8px; margin-top: 10px; font-size: 13px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .download-section { margin-top: 12px; padding-top: 10px; border-top: 1px solid #eee; display: none; }
    .download-section.active { display: block; }
    .phase { font-weight: 600; }
    .error { color: #c33; }
    .done { color: #393; }
    .folder { font-size: 11px; color: #666; word-break: break-all; margin-top: 4px; }
    .list-section { margin-top: 10px; display: none; }
    .list-section.active { display: block; }
    .item-list { list-style: none; padding: 0; margin: 0; max-height: 180px; overflow-y: auto; }
    .item-list li { display: flex; align-items: baseline; gap: 6px; padding: 2px 0; font-size: 12px; }
    .item-list .icon { width: 14px; text-align: center; flex-shrink: 0; }
    .item-list .label-name { color: #666; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-list .folder-hint { color: #999; font-size: 10px; margin-right: 4px; }
    .item-list li.done .label-name { color: #393; }
    .item-list li.error .label-name { color: #c33; }
    .item-list li.skipped .label-name, .item-list li.unavailable .label-name { color: #aaa; font-style: italic; }
    .count-badge { font-weight: normal; color: #999; font-size: 11px; text-transform: none; letter-spacing: 0; }
  </style>
</head>
<body>
  <h1>Kaltura Lecture Archival Kit</h1>
  <div class="row"><span class="label">Flavors captured:</span> <span id="flavor-count" class="value">…</span></div>
  <div class="row"><span class="label">KS:</span> <span id="ks-status" class="value">…</span></div>
  <button id="download-btn" disabled>Download</button>

  <div id="multimedia-section" class="list-section">
    <h2>Multimídia</h2>
    <ul id="multimedia-list" class="item-list"></ul>
  </div>

  <div id="materials-section" class="list-section">
    <h2>Materiais <span id="materials-count" class="count-badge"></span></h2>
    <ul id="materials-list" class="item-list"></ul>
  </div>

  <div id="download-section" class="download-section">
    <div class="row"><span class="label">Phase:</span> <span id="dl-phase" class="value phase">…</span></div>
    <div class="row"><span class="label">Progress:</span> <span id="dl-progress" class="value">—</span></div>
    <div id="dl-folder" class="folder"></div>
    <div id="dl-error" class="error"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
